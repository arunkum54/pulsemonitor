server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: lets the frontend call /api/* relative to itself if you
    # prefer not to bake VITE_API_URL in at build time.
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_set_header Host $host;
    }
}
